<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ultra Max Restaurant System</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h2>SANKHA TANZANIA MODERN ROYAL RESTAURANT</h2>
</header>

<nav>
<button onclick="show('menu')">Menu</button>
<button onclick="show('cart')">Cart</button>
<button onclick="show('admin')">Admin</button>
<button onclick="show('orders')">Orders</button>
</nav>


<div id="menuSection" class="section active">
<div id="menu"></div>
</div>

<div id="cartSection" class="section">
<h2>Cart</h2>
<div id="cart"></div>
<h3>Total: <span id="total">0</span></h3>
<button onclick="checkout()">Checkout</button>
</div>


<div id="adminSection" class="section">
<h2>Admin Panel</h2>

<input id="name" placeholder="Food name"><br>
<input id="price" placeholder="Price"><br>
<input id="image" placeholder="Image URL"><br>

<select id="category">
<option>Breakfast</option>
<option>Lunch</option>
<option>Dinner</option>
</select><br>

<button onclick="saveFood()">Save Food</button>
</div>


<div id="ordersSection" class="section">
<h2>Orders</h2>
<div id="orders"></div>
</div>

<script src="script.js"></script>
</body>
</html>
